<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Botanical Pro Calculator</title>
    <link rel="preload" as="image" href="image_8ea965.jpg">
    <link rel="preload" as="image" href="image_8efb5f.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <button id="theme-toggle" onclick="toggleTheme()">✨ Light Mode</button>

    <div class="calculator">
        <div class="display-container">
            <div id="history"></div>
            <div id="display">0</div>
        </div>

        <div class="solver-tabs">
            <button id="btn-std" class="tab-btn active" onclick="setMode('std')">Standard</button>
            <button id="btn-sci" class="tab-btn" onclick="setMode('sci')">Science</button>
        </div>
        
        <div id="btn-grid" class="buttons">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
