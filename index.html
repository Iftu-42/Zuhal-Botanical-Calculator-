<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="toggle-btn">✨ Switch Theme</button>

    <div class="calculator">
      <div class="display-container">
            <div id="history"></div>
              <div id="display">0</div>
          </div>
        <div class="buttons">
            <button class="btn func" onclick="clearDisplay()">C</button>
            <button class="btn func" onclick="deleteLast()">DEL</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>
            
            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('-')">-</button>
            
            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>
            
            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button class="btn equal" onclick="calculate()">=</button>

            <button class="btn func" onclick="appendValue('%')">%</button>
            <button class="btn func" onclick="calculateRoot()">√</button>
            <button class="btn func" onclick="appendValue('**')">x²</button>
            
            <button class="btn zero" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
