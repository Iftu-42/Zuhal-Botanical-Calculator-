<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Botanical Pro Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="leaf-container"></div>
    
    <button id="theme-toggle" class="toggle-btn" onclick="toggleTheme()">✨ Switch Theme</button>

    <div class="calculator">
        <div class="display-container">
            <div id="history"></div>
            <div id="display">0</div>
        </div>

        <div class="solver-tabs">
            <button id="btn-std" class="tab-btn active" onclick="setMode('std')">Standard</button>
            <button id="btn-sci" class="tab-btn" onclick="setMode('sci')">Science</button>
        </div>
        
        <div class="buttons" id="btn-grid">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
